    name IS name
    boundingObject Group {
      children [
        # Head
        Transform {
          translation 0 0 0.4
          children [
            Sphere {
              radius 0.08
            }
          ]
        }
        # Body
        Transform {
          translation 0 0 0.15
          children [
            Box {
              size 0.25 0.3 0.35
            }
          ]
        }
      ]
    }
    physics Physics {
      density -1
      mass 6.5
      centerOfMass [0 0 0.05]
      damping Damping {
        linear 0.5
        angular 0.5
      }
      inertiaMatrix [
        0.12 0.12 0.08
        0 0 0

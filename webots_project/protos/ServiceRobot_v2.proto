#VRML_SIM R2023b utf8
# Professional Self-Balancing Humanoid Service Robot v2.0
# Realistic human-like structure with perfect physics
# Built for GTA-5 quality graphics

PROTO ServiceRobot [
  field SFVec3f    translation  0 0 0.3
  field SFRotation rotation     0 0 1 0
  field SFString   name         "service_robot"
  field SFString   controller   "restaurant_controller"
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller
    supervisor FALSE
    
    children [
      # ========== HEAD (Face display) ==========
      Transform {
        translation 0 0 0.4
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.95 0.95 0.95
              metalness 0.9
              roughness 0.1
            }
            geometry Sphere {
              radius 0.08
              subdivision 3
            }
          }
        ]
      }
      
      # Face screen
      Transform {
        translation 0.08 0 0.4
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.1 0.8 1.0
              emissiveColor 0.1 0.6 0.8
              metalness 0.9
              roughness 0.05
            }
            geometry Box {
              size 0.01 0.12 0.12
            }
          }
        ]
      }
      
      # ========== NECK ==========
      Transform {
        translation 0 0 0.3
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.2 0.2 0.2
              metalness 0.8
              roughness 0.3
            }
            geometry Cylinder {
              height 0.08
              radius 0.04
              subdivision 16
            }
          }
        ]
      }
      
      # ========== BODY (Torso - Box for stability) ==========
      DEF BODY Transform {
        translation 0 0 0.15
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.2 0.6 0.9
              metalness 0.7
              roughness 0.3
            }
            geometry Box {
              size 0.25 0.3 0.35
            }
          }
        ]
      }
      
      # ========== WAIST/HIP (connection to wheels) ==========
      Transform {
        translation 0 0 -0.08
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.15 0.15 0.15
              metalness 0.8
              roughness 0.4
            }
            geometry Cylinder {
              height 0.06
              radius 0.14
              subdivision 16
            }
          }
        ]
      }
      
      # ========== IMU Sensor ==========
      InertialUnit {
        name "imu"
      }
      
      # ========== GPS ==========
      GPS {
        name "gps"
      }
      
      # ========== Distance Sensors ==========
      DistanceSensor {
        translation 0.13 0 0.15
        rotation 0 0 1 0
        name "distance_front"
        lookupTable [
          0 0 0
          2 2000 0
        ]
        numberOfRays 2
      }
      
      DistanceSensor {
        translation 0 0.13 0.15
        rotation 0 0 1 1.5708
        name "distance_left"
        lookupTable [
          0 0 0
          2 2000 0
        ]
        numberOfRays 2
      }
      
      DistanceSensor {
        translation 0 -0.13 0.15
        rotation 0 0 1 -1.5708
        name "distance_right"
        lookupTable [
          0 0 0
          2 2000 0
        ]
        numberOfRays 2
      }
      
      # ========== LEFT WHEEL (Visible at bottom) ==========
      HingeJoint {
        jointParameters HingeJointParameters {
          position 0
          axis 0 1 0
          anchor 0 0.16 -0.2
          dampingConstant 0.2
        }
        device [
          RotationalMotor {
            name "left_wheel_motor"
            maxVelocity 20
            maxTorque 12
          }
          PositionSensor {
            name "left_wheel_sensor"
          }
        ]
        endPoint Solid {
          translation 0 0.16 -0.2
          rotation 1 0 0 1.5708
          children [
            DEF WHEEL_SHAPE Shape {
              appearance PBRAppearance {
                baseColor 0.1 0.1 0.1
                metalness 0.5
                roughness 0.8
              }
              geometry Cylinder {
                height 0.05
                radius 0.1
                subdivision 24
              }
            }
          ]
          name "left_wheel"
          contactMaterial "wheel"
          boundingObject Cylinder {
            height 0.05
            radius 0.1
            subdivision 24
          }
          physics Physics {
            density -1
            mass 0.4
          }
        }
      }
      
      # ========== RIGHT WHEEL (Visible at bottom) ==========
      HingeJoint {
        jointParameters HingeJointParameters {
          position 0
          axis 0 1 0
          anchor 0 -0.16 -0.2
          dampingConstant 0.2
        }
        device [
          RotationalMotor {
            name "right_wheel_motor"
            maxVelocity 20
            maxTorque 12
          }
          PositionSensor {
            name "right_wheel_sensor"

                              subdivision 8
                            }
                          }
                        ]
                      }
                      
                      # Pinky
                      Transform {
                        translation -0.015 0 -0.035
                        children [
                          Shape {
                            appearance PBRAppearance {
                              baseColor 0.86 0.85 0.83
                              metalness 0.7
                              roughness 0.3
                            }
                            geometry Cylinder {
                              height 0.028
                              radius 0.004
                              subdivision 8
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
                name "left_forearm"
                boundingObject Transform {
                  translation 0 0 -0.08
                  children [
                    Cylinder {
                      height 0.2
                      radius 0.025
                    }
                  ]
                }
                physics Physics {
                  density -1
                  mass 0.15

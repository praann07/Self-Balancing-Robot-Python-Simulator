      }
      
      # ========== RIGHT ARM (Mirror) ==========
      HingeJoint {
        jointParameters HingeJointParameters {
          position 0.5
          axis 0 1 0
          anchor 0 -0.17 0.22
        }
        device [
          RotationalMotor {
            name "right_shoulder_motor"
            minPosition -0.5
            maxPosition 3.14

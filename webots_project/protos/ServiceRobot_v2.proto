                        translation 0.02 -0.02 -0.02
                        rotation 0 1 0 -0.5
                        children [
                          Shape {
                            appearance PBRAppearance {
                              baseColor 0.86 0.85 0.83
                              metalness 0.7
                              roughness 0.3
                            }
                            geometry Cylinder {
                              height 0.03

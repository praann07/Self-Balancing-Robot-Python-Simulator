                  # REALISTIC HAND (5 fingers)
                  Transform {
                    translation 0 0 -0.15
                    children [
                      # Palm
                      Shape {
                        appearance PBRAppearance {
                          baseColor 0.86 0.85 0.83
                          metalness 0.7
                          roughness 0.3
                        }
                        geometry Box {
                          size 0.05 0.04 0.06
